<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>Todo List</p>

    <div class="todo-input-grid">
        <input class="dueDateCalender" type="date" onkeydown="enterToInsert(event)">
        <input class="todoOne" type="text" placeholder="Todo Name" onkeydown="enterToInsert(event)">
        <button class="insertButton" onclick="insertTodo()">Add</button>
    </div>
    <div class="todoRender todo-render-grid">
    </div>

    <script src="index.js"></script>
</body>
</html>
